<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Únete a Sabanalarga Social</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .reg-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #0866ff; font-weight: 800; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-reg { width: 100%; padding: 12px; background: #42b72a; color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
        .btn-reg:hover { background: #36a420; }
        a { color: #0866ff; text-decoration: none; font-size: 0.9rem; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="reg-card">
        <h1>Crear cuenta</h1>
        <p style="color: #65676b;">Es rápido y fácil.</p>
        <form action="/registro" method="POST">
            <input type="text" name="nombre" placeholder="Nombre completo" required>
            <input type="email" name="correo" placeholder="Correo electrónico" required>
            <input type="text" name="telefono" placeholder="Número de celular (WhatsApp)" required>
            <input type="password" name="pass" placeholder="Contraseña nueva" required>
            <button type="submit" class="btn-reg">Registrarte</button>
        </form>
        <a href="/login">¿Ya tienes una cuenta?</a>
    </div>
</body>
</html>
