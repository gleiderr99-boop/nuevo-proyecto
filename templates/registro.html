<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Vendedores | Sabanalarga</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #f1f5f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }
        .register-card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
        }
        h2 { text-align: center; color: var(--dark); margin-bottom: 10px; }
        p { text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group i { position: absolute; left: 15px; top: 15px; color: #94a3b8; }
        
        input { 
            width: 100%; 
            padding: 12px 12px 12px 45px; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            font-family: inherit; 
            box-sizing: border-box; 
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        button { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .footer-link { text-align: center; margin-top: 20px; font-size: 0.85rem; }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="register-card">
        <h2>Únete a la Red 🛍️</h2>
        <p>Crea tu cuenta de vendedor y empieza a publicar tus productos en Sabanalarga.</p>

        <form action="/registro" method="POST">
            <div class="input-group">
                <i class="fas fa-store"></i>
                <input type="text" name="nombre" placeholder="Nombre de tu negocio" required>
            </div>

            <div class="input-group">
                <i class="fab fa-whatsapp"></i>
                <input type="text" name="telefono" placeholder="WhatsApp (Ej: 3001234567)" required>
            </div>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="correo" placeholder="Tu correo electrónico" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="pass" placeholder="Crea una contraseña" required>
            </div>

            <button type="submit">Crear Cuenta de Vendedor</button>
        </form>

        <div class="footer-link">
            ¿Ya tienes cuenta? <a href="/login">Inicia Sesión aquí</a>
        </div>
        
        <div style="text-align: center; margin-top: 15px;">
            <a href="/" style="color: #64748b; text-decoration: none; font-size: 0.8rem;"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
        </div>
    </div>

</body>
</html>
