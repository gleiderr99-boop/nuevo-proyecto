<!DOCTYPE html>
<html>
<head>
    <title>Catálogo - Gleider Shop</title>
    <style>
        .grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 20px; }
        .card { border: 1px solid #ddd; border-radius: 15px; width: 250px; padding: 15px; text-align: center; background: white; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .price { color: green; font-weight: bold; font-size: 1.5em; }
        .wa-btn { background: #25d366; color: white; padding: 10px; text-decoration: none; border-radius: 5px; display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <nav style="background: #333; color: white; padding: 15px; text-align: space-between;">
        <span>Hola, {{ session['user_name'] }}!</span> | <a href="/logout" style="color: white;">Cerrar Sesión</a>
    </nav>

    <h1 style="text-align: center;">Nuestros Productos</h1>

    <div class="grid">
        {% for p in productos %}
        <div class="card">
            <img src="{{ url_for('static', filename='uploads/' + p.imagen) }}">
            <h3>{{ p.nombre }}</h3>
            <p>{{ p.descripcion }}</p>
            <p class="price">${{ p.precio }}</p>
            <a href="https://wa.me/573000000000?text=Hola%20Gleider,%20me%20interesa%20el%20producto:%20{{ p.nombre }}" class="wa-btn">Pedir por WhatsApp</a>
        </div>
        {% endfor %}
    </div>
</body>
</html>
