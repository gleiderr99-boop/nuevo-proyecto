<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Profesional</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Nuestra Tienda</h1>
        <p>Los mejores productos a un click</p>
    </header>

    <main class="container">
        <div class="grid-productos">
            {% for p in productos %}
            <div class="card">
                <img src="{{ url_for('static', filename='uploads/' + p.imagen) }}" alt="{{ p.nombre }}">
                <div class="info">
                    <h3>{{ p.nombre }}</h3>
                    <p class="precio">${{ p.precio }}</p>
                    <a href="https://wa.me/573000000000?text=Hola, me interesa el producto: {{ p.nombre }}" class="btn-whatsapp">
                        Pedir por WhatsApp
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>
</body>
</html>
