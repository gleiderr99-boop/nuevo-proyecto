<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | Sabanalarga Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 10px; }
        p { text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; background: #2563eb; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #2563eb; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Restablecer Clave</h2>
        <p>Ingresa tu correo registrado y la nueva contraseña que deseas usar.</p>
        <form action="/recuperar" method="POST">
            <input type="email" name="correo" placeholder="Tu correo electrónico" required>
            <input type="password" name="nueva_pass" placeholder="Nueva contraseña" required>
            <button type="submit">Actualizar Contraseña</button>
        </form>
        <a href="/login" class="back-link">Volver al inicio de sesión</a>
    </div>
</body>
</html>
